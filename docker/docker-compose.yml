# docker/docker-compose.yml
# ---------------------------------------------------------------
# WHY docker-compose? It lets you define multiple containers and
# their relationships in one file, then start everything with
# one command: "docker compose up". Enterprise standard.
# ---------------------------------------------------------------

version: "3.9"

services:

  # ============================================================
  # SERVICE 1: OpenClaw Gateway
  # The brain — all agents connect to this process.
  # WHY isolated? So it cannot touch your Windows filesystem.
  # ============================================================
  openclaw-gateway:
    image: node:22-alpine          # Official Node.js image — OpenClaw requires Node
    container_name: openclaw-gateway
    working_dir: /app
    volumes:
      # Source code mounted READ-ONLY (agents can't modify their own code)
      - ../agents:/app/agents:ro
      # Named volume for runtime data (sessions, memory) — NOT your C:\Users\
      - openclaw-data:/app/data
    env_file:
      - ../.env                    # Injects all secrets from your .env file
    networks:
      - intel-net
    ports: []                      # NO ports exposed to host — internal only
    command: >
      sh -c "npm install -g openclaw@latest &&
             openclaw start --config /app/agents/openclaw.json"
    restart: unless-stopped
    # SECURITY: Read-only root filesystem except named volumes
    read_only: true
    tmpfs:
      - /tmp                       # Temp files only live in memory, not disk

  # ============================================================
  # SERVICE 2: Scraper Workers
  # Three agents in one container — each has its own workspace.
  # WHY Python? BeautifulSoup + feedparser are the standard
  # tools for parsing RSS feeds and HTML press releases.
  # ============================================================
  scraper-agents:
    build:
      context: ..
      dockerfile: docker/Dockerfile.scraper
    container_name: scraper-agents
    volumes:
      - ../agents:/app/agents:ro
      - openclaw-data:/app/data
    env_file:
      - ../.env
    networks:
      - intel-net
    depends_on:
      - openclaw-gateway           # Starts AFTER the gateway is ready
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp

  # ============================================================
  # SERVICE 3: Analyst Agent
  # Calls Gemini free tier to summarize and score each article.
  # ============================================================
  analyst-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.analyst
    container_name: analyst-agent
    volumes:
      - ../agents:/app/agents:ro
      - openclaw-data:/app/data
    env_file:
      - ../.env
    networks:
      - intel-net
    depends_on:
      - openclaw-gateway
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp

  # ============================================================
  # SERVICE 4: Formatter + Delivery Agent
  # Builds the digest and fires the Discord/Telegram webhook.
  # ============================================================
  formatter-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.formatter
    container_name: formatter-agent
    volumes:
      - ../agents:/app/agents:ro
      - openclaw-data:/app/data
    env_file:
      - ../.env
    networks:
      - intel-net
    depends_on:
      - analyst-agent
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp

# ============================================================
# NETWORK: Isolated bridge — containers talk to each other
# but are invisible to everything else on your Windows network.
# ============================================================
networks:
  intel-net:
    driver: bridge
    internal: false                # Allows outbound internet (for scraping + Gemini)

# ============================================================
# VOLUME: Named volume = Docker manages the storage location.
# It lives inside Docker Desktop's virtual disk, NOT in C:\Users\
# This is the Zero-Trust guarantee.
# ============================================================
volumes:
  openclaw-data:
    driver: local