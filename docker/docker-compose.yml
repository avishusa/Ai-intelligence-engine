services:

  # Always-on scheduler — the only container that should restart
  pipeline-scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    container_name: pipeline-scheduler
    volumes:
      - ../pipeline:/app/pipeline:ro
      - openclaw-data:/app/data
    env_file:
      - ../.env
    networks:
      - intel-net
    restart: unless-stopped      # stays alive, fires pipeline weekly

  # These three run ONCE per pipeline trigger then exit cleanly
  # WHY no restart? The scheduler calls them via subprocess.
  # restart: no means Docker won't loop them endlessly.
  scraper-agents:
    build:
      context: ..
      dockerfile: docker/Dockerfile.scraper
    container_name: scraper-agents
    volumes:
      - ../agents:/app/agents:ro
      - openclaw-data:/app/data
    env_file:
      - ../.env
    networks:
      - intel-net
    restart: "no"

  analyst-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.analyst
    container_name: analyst-agent
    volumes:
      - ../agents:/app/agents:ro
      - openclaw-data:/app/data
    env_file:
      - ../.env
    networks:
      - intel-net
    restart: "no"

  formatter-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.formatter
    container_name: formatter-agent
    volumes:
      - ../agents:/app/agents:ro
      - openclaw-data:/app/data
    env_file:
      - ../.env
    networks:
      - intel-net
    restart: "no"

networks:
  intel-net:
    driver: bridge

volumes:
  openclaw-data:
    driver: local
